<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <title>Megacinema - Carrito</title>
  </head>

  <body>
    <header class="header">
      <div class="topbar-inner">
        <img src="../images/logo.png" alt="Logo" class="logo" />
      </div>
    </header>

    <div class="page-shell">
      <nav class="sidebar" aria-label="Navegacion principal">
        <ul>
          <li><a href="../index.html">🏠 Inicio</a></li>
          <li class="nav-link-protected"><a href="products.html">🎬 Entradas</a></li>
          <li class="nav-link-protected"><a href="carrito.html" class="active" aria-current="page">🛒 Carrito</a></li>
          <li class="nav-link-protected"><a href="ticket.html">🎟️ Ticket</a></li>
        </ul>
      </nav>

      <main id="content" class="carrito-main">
        <div class="carrito-panel">
          <div id="contenedor-nombre" class="bienvenida-usuario"></div>
          <h2>Tu carrito</h2>
          <div id="carrito-container"></div>
          <div class="carrito-footer" id="carrito-footer" style="display:none;">
            <span>Total: <span id="carrito-total">$0</span></span>
            <div class="carrito-footer-acciones">
              <button class="btn-vaciar" id="btn-vaciar" type="button">Vaciar carrito</button>
              <button class="btn-confirmar" id="btn-confirmar" type="button">Confirmar compra</button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <footer>
      <span>Juan Lencioni & Leandro Quinteros</span>
    </footer>

    <div id="modal-confirmacion" class="modal-overlay" style="display: none;">
      <div class="modal-content">
          <h3>¿Confirmar Compra?</h3>
          <p>Tu pedido va a finalizar.</p>
          <div class="modal-botones">
              <button id="btn-modal-cancelar" class="btn-secundario">Modificar Pedido</button>
              <button id="btn-modal-aceptar" class="btn-primario">Confirmar</button>
          </div>
      </div>
    </div>

    <script src="/js/main.js"></script>
    <script src="/js/carrito.js"></script>
  </body>
</html>
