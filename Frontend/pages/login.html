<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="icon" type="image/png" href="../favicon.png" />
    <link rel="stylesheet" href="../css/style.css" />
    <title>Megacinema - Login</title>
  </head>

  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <h1>Iniciar sesión</h1>
        <p>Ingresá tu correo y contraseña para acceder a Mega Cinema.</p>

        <form class="login-form">
          <input type="email" placeholder="Correo electrónico" id="input-email" required />
          <input type="password" placeholder="Contraseña" id="input-password" required />
          <button class="btn-ok" type="submit">Ingresar</button>
        </form>
      </div>
    </div>

    <footer>
      <span>Juan Lencioni & Leandro Quinteros</span>
    </footer>
  </body>
</html>
